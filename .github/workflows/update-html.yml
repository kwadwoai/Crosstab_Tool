name: Convert Notebook to HTML

on:
  push:
    paths:
      - '**.ipynb'  # triggers only when notebooks change

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Jupyter
        run: |
          pip install notebook

      - name: Convert notebook to index.html
        run: |
          jupyter nbconvert --to html --output index.html Crosstab_Tool.ipynb

      - name: Commit and push HTML
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Auto-update index.html from notebook" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kwadwoai/Crosstab_Tool.git HEAD:main
